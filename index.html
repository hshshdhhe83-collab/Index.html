<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chocolate Badam | India's Premium Chocolate & Gift Destination</title>
<meta name="description" content="Chocolate Badam — 2000+ premium chocolates, almond chocolates, gift hampers & festive boxes. Fast delivery across Mandi Dabwali, Haryana. Order online or via WhatsApp.">
<meta name="theme-color" content="#2b1208">
<link rel="manifest" href="data:application/json,{%22name%22:%22Chocolate%20Badam%22,%22short_name%22:%22ChocolateBadam%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%232b1208%22,%22theme_color%22:%22%232b1208%22}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Marcellus&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cocoa-950:#1c0d06;
    --cocoa-900:#2b1208;
    --cocoa-800:#3e1c0d;
    --cocoa-700:#5a2c14;
    --cream:#f6ecd9;
    --cream-dim:#e7d9bd;
    --gold:#cda35a;
    --gold-bright:#e9c789;
    --gold-deep:#a87f3e;
    --almond:#d9b48f;
    --line:rgba(233,199,137,0.18);
    --shadow:0 30px 60px -25px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--cocoa-950);
    color:var(--cream);
    font-family:'Manrope',sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--gold); color:var(--cocoa-950);}
  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}
  h1,h2,h3,h4{font-family:'Cormorant Garamond', serif; font-weight:600; letter-spacing:.01em;}
  .eyebrow{
    font-family:'Marcellus', serif;
    text-transform:uppercase;
    letter-spacing:.32em;
    font-size:.7rem;
    color:var(--gold);
  }
  .wrap{max-width:1280px; margin:0 auto; padding:0 28px;}
  :focus-visible{outline:2px solid var(--gold-bright); outline-offset:3px;}

  /* background texture */
  body::before{
    content:"";
    position:fixed; inset:0; z-index:-2;
    background:
      radial-gradient(60% 50% at 18% 10%, rgba(205,163,90,.10), transparent 60%),
      radial-gradient(50% 40% at 85% 0%, rgba(233,199,137,.07), transparent 60%),
      var(--cocoa-950);
  }
  body::after{
    content:"";
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:3px 3px;
  }

  /* ---------- NAV ---------- */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    padding:18px 0;
    transition:.4s ease;
    background:rgba(28,13,6,0);
  }
  header.scrolled{
    background:rgba(28,13,6,0.72);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border-bottom:1px solid var(--line);
    padding:12px 0;
  }
  nav{display:flex; align-items:center; justify-content:space-between; gap:24px;}
  .brand{display:flex; align-items:center; gap:10px; font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:700; color:var(--cream);}
  .brand .mark{
    width:38px; height:38px; border-radius:50%;
    display:grid; place-items:center;
    background:conic-gradient(from 180deg, var(--gold-deep), var(--gold-bright), var(--gold-deep));
    color:var(--cocoa-950); font-family:'Marcellus',serif; font-size:1.1rem;
    box-shadow:0 6px 18px rgba(205,163,90,.35);
  }
  .brand .sub{display:block; font-family:'Manrope',sans-serif; font-size:.6rem; letter-spacing:.25em; color:var(--gold); text-transform:uppercase; font-weight:600;}
  .navlinks{display:flex; gap:30px; list-style:none;}
  .navlinks a{font-size:.84rem; letter-spacing:.04em; color:var(--cream-dim); position:relative; padding:4px 0; transition:.3s;}
  .navlinks a::after{content:""; position:absolute; left:0; bottom:-2px; width:0; height:1px; background:var(--gold); transition:.35s;}
  .navlinks a:hover{color:var(--gold-bright);}
  .navlinks a:hover::after{width:100%;}
  .navcta{display:flex; align-items:center; gap:12px;}
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:11px 22px; border-radius:999px;
    font-size:.78rem; letter-spacing:.05em; font-weight:600;
    border:1px solid transparent; cursor:pointer;
    transition:.35s cubic-bezier(.2,.8,.2,1);
    white-space:nowrap;
  }
  .btn-gold{background:linear-gradient(135deg, var(--gold-bright), var(--gold-deep)); color:var(--cocoa-950); box-shadow:0 10px 24px -8px rgba(205,163,90,.55);}
  .btn-gold:hover{transform:translateY(-2px); box-shadow:0 16px 30px -8px rgba(205,163,90,.7);}
  .btn-ghost{border-color:var(--line); color:var(--cream); background:rgba(255,255,255,0.03);}
  .btn-ghost:hover{border-color:var(--gold); color:var(--gold-bright);}
  .btn-wa{background:#1f3d2f; color:#bdf2cf; border:1px solid #2f5a44;}
  .btn-wa:hover{transform:translateY(-2px); background:#244a37;}
  .burger{display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none;}
  .burger span{width:24px; height:2px; background:var(--cream);}

  /* ---------- HERO ---------- */
  .hero{
    position:relative; min-height:100svh; display:flex; align-items:center;
    padding:140px 0 90px;
    overflow:hidden;
  }
  .hero-bg{
    position:absolute; inset:0; z-index:-1;
  }
  .hero-bg img{width:100%; height:100%; object-fit:cover; opacity:.42; filter:saturate(1.05) contrast(1.05);}
  .hero-bg::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(28,13,6,.55) 0%, rgba(28,13,6,.85) 60%, var(--cocoa-950) 100%),
               linear-gradient(90deg, rgba(28,13,6,.9) 0%, rgba(28,13,6,.25) 55%);
  }
  .hero-grid{display:grid; grid-template-columns:1.1fr .9fr; gap:50px; align-items:center;}
  .hero h1{
    font-size:clamp(2.6rem, 5.4vw, 4.6rem);
    line-height:1.04;
    color:var(--cream);
    margin:18px 0 22px;
  }
  .hero h1 em{font-style:italic; color:var(--gold-bright);}
  .hero p.lead{font-size:1.05rem; color:var(--cream-dim); max-width:520px; line-height:1.7; margin-bottom:34px;}
  .hero-ctas{display:flex; flex-wrap:wrap; gap:14px; margin-bottom:46px;}
  .stat-row{display:flex; gap:38px; flex-wrap:wrap;}
  .stat-row .stat b{display:block; font-family:'Cormorant Garamond',serif; font-size:2rem; color:var(--gold-bright);}
  .stat-row .stat span{font-size:.72rem; letter-spacing:.06em; color:var(--cream-dim); text-transform:uppercase;}

  .hero-card{
    position:relative; border-radius:28px; overflow:hidden;
    border:1px solid var(--line);
    box-shadow:var(--shadow);
    aspect-ratio:4/5;
  }
  .hero-card img{width:100%; height:100%; object-fit:cover;}
  .hero-card::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg, transparent 50%, rgba(28,13,6,.85)); }
  .hero-card .tag{
    position:absolute; left:18px; bottom:18px; right:18px;
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  .hero-card .tag .name{font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:var(--cream);}
  .hero-card .tag .price{font-family:'Marcellus',serif; color:var(--gold-bright); font-size:1.1rem;}
  .float-badge{
    position:absolute; top:22px; left:-18px;
    background:rgba(28,13,6,.78); backdrop-filter:blur(10px);
    border:1px solid var(--line); border-radius:16px;
    padding:14px 18px; display:flex; gap:10px; align-items:center;
    animation:floatY 4.5s ease-in-out infinite;
  }
  .float-badge .ico{width:34px; height:34px; border-radius:50%; background:var(--gold); display:grid; place-items:center; color:var(--cocoa-950); font-weight:700;}
  @keyframes floatY{0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)}}

  .marquee{
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.02);
    padding:14px 0; overflow:hidden; white-space:nowrap;
  }
  .marquee-track{display:inline-flex; gap:50px; animation:scrollLeft 26s linear infinite;}
  .marquee-track span{font-family:'Marcellus',serif; letter-spacing:.18em; font-size:.78rem; text-transform:uppercase; color:var(--gold);}
  @keyframes scrollLeft{from{transform:translateX(0)} to{transform:translateX(-50%)}}

  /* ---------- SECTION HEAD ---------- */
  section{padding:108px 0;}
  .sec-head{max-width:680px; margin-bottom:56px;}
  .sec-head h2{font-size:clamp(2rem,3.6vw,3rem); margin-top:12px; color:var(--cream);}
  .sec-head p{color:var(--cream-dim); margin-top:16px; line-height:1.7; font-size:.98rem;}
  .sec-head.center{margin-left:auto; margin-right:auto; text-align:center;}

  /* ---------- CATEGORY / PRODUCTS ---------- */
  .cat-scroller{display:flex; gap:14px; overflow-x:auto; padding-bottom:16px; margin-bottom:46px; scrollbar-width:none;}
  .cat-scroller::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; padding:10px 20px; border-radius:999px; border:1px solid var(--line);
    font-size:.78rem; letter-spacing:.03em; color:var(--cream-dim); cursor:pointer; transition:.3s;
    background:rgba(255,255,255,.02);
  }
  .chip.active, .chip:hover{background:var(--gold); color:var(--cocoa-950); border-color:var(--gold); font-weight:600;}

  .grid-products{display:grid; grid-template-columns:repeat(4,1fr); gap:24px;}
  .pcard{
    border-radius:20px; overflow:hidden; border:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.01));
    transition:.4s cubic-bezier(.2,.8,.2,1); position:relative;
  }
  .pcard:hover{transform:translateY(-8px); border-color:rgba(233,199,137,.4); box-shadow:0 24px 40px -20px rgba(0,0,0,.55);}
  .pcard .pimg{aspect-ratio:1/1; overflow:hidden;}
  .pcard .pimg img{width:100%; height:100%; object-fit:cover; transition:.6s;}
  .pcard:hover .pimg img{transform:scale(1.08);}
  .pcard .pbody{padding:18px 18px 22px;}
  .pcard .ptag{font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold);}
  .pcard h3{font-size:1.18rem; margin:7px 0 6px; color:var(--cream);}
  .pcard .pmeta{display:flex; justify-content:space-between; align-items:center; margin-top:12px;}
  .pcard .price{font-family:'Marcellus',serif; color:var(--gold-bright); font-size:1.05rem;}
  .pcard .add{
    width:36px; height:36px; border-radius:50%; border:1px solid var(--line);
    display:grid; place-items:center; color:var(--cream); cursor:pointer; transition:.3s; background:none;
  }
  .pcard .add:hover{background:var(--gold); color:var(--cocoa-950); border-color:var(--gold);}
  .badge-new{position:absolute; top:14px; left:14px; background:var(--cocoa-950); border:1px solid var(--gold); color:var(--gold-bright); font-size:.6rem; letter-spacing:.12em; padding:5px 10px; border-radius:999px; text-transform:uppercase; z-index:2;}

  .more-row{display:flex; justify-content:center; margin-top:48px;}

  /* category tiles */
  .cat-tiles{display:grid; grid-template-columns:repeat(5,1fr); gap:18px;}
  .ctile{
    position:relative; aspect-ratio:3/3.6; border-radius:18px; overflow:hidden; border:1px solid var(--line);
  }
  .ctile img{width:100%; height:100%; object-fit:cover; transition:.6s;}
  .ctile:hover img{transform:scale(1.1);}
  .ctile .lbl{
    position:absolute; inset:auto 0 0 0; padding:16px;
    background:linear-gradient(180deg, transparent, rgba(20,9,4,.92));
  }
  .ctile .lbl span{font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--cream);}
  .ctile .lbl small{display:block; color:var(--gold); font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; margin-top:3px;}

  /* ---------- FEATURES ---------- */
  .feat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:22px;}
  .feat{
    border:1px solid var(--line); border-radius:18px; padding:30px 24px;
    background:rgba(255,255,255,.025); transition:.35s;
  }
  .feat:hover{border-color:rgba(233,199,137,.4); transform:translateY(-6px);}
  .feat .fi{
    width:50px; height:50px; border-radius:14px; margin-bottom:18px;
    display:grid; place-items:center; background:rgba(205,163,90,.12); color:var(--gold-bright); font-size:1.3rem;
  }
  .feat h4{color:var(--cream); font-size:1.15rem; margin-bottom:8px;}
  .feat p{color:var(--cream-dim); font-size:.86rem; line-height:1.6;}

  /* ---------- GALLERY (masonry) ---------- */
  .masonry{
    columns:4 220px; column-gap:18px;
  }
  .masonry .mitem{
    break-inside:avoid; margin-bottom:18px; border-radius:16px; overflow:hidden;
    border:1px solid var(--line); position:relative;
  }
  .masonry .mitem img{width:100%; display:block; transition:.5s;}
  .masonry .mitem:hover img{transform:scale(1.05); filter:brightness(1.05);}
  .masonry .mitem .cap{
    position:absolute; left:0; right:0; bottom:0; padding:12px 14px;
    background:linear-gradient(180deg, transparent, rgba(20,9,4,.9));
    font-size:.74rem; letter-spacing:.04em; color:var(--cream);
    opacity:0; transition:.3s;
  }
  .masonry .mitem:hover .cap{opacity:1;}

  /* ---------- TESTIMONIALS ---------- */
  .test-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
  .tcard{border:1px solid var(--line); border-radius:18px; padding:30px; background:rgba(255,255,255,.025);}
  .stars{color:var(--gold-bright); letter-spacing:2px; margin-bottom:14px;}
  .tcard p{color:var(--cream-dim); font-size:.92rem; line-height:1.7; margin-bottom:20px;}
  .tcard .who{display:flex; align-items:center; gap:12px;}
  .tcard .who .av{width:42px; height:42px; border-radius:50%; background:var(--gold); color:var(--cocoa-950); display:grid; place-items:center; font-family:'Cormorant Garamond',serif; font-weight:700;}
  .tcard .who b{display:block; color:var(--cream); font-size:.88rem;}
  .tcard .who span{font-size:.72rem; color:var(--cream-dim);}

  /* ---------- OFFER STRIP ---------- */
  .offer{
    border-radius:28px; overflow:hidden; position:relative;
    padding:70px 50px; text-align:center;
    background:linear-gradient(135deg, var(--cocoa-800), var(--cocoa-900));
    border:1px solid var(--line);
  }
  .offer::before{content:""; position:absolute; inset:0; background:radial-gradient(60% 80% at 50% 0%, rgba(233,199,137,.16), transparent 70%);}
  .offer h2{font-size:clamp(1.8rem,3vw,2.6rem); margin-bottom:14px; position:relative;}
  .offer p{color:var(--cream-dim); margin-bottom:30px; position:relative;}
  .offer .btn{position:relative;}

  /* ---------- ABOUT ---------- */
  .about-grid{display:grid; grid-template-columns:.9fr 1.1fr; gap:60px; align-items:center;}
  .about-img{position:relative; border-radius:24px; overflow:hidden; border:1px solid var(--line); box-shadow:var(--shadow);}
  .about-img img{width:100%; aspect-ratio:4/5; object-fit:cover;}
  .about-text p{color:var(--cream-dim); line-height:1.85; margin-bottom:18px; font-size:.98rem;}
  .signature{font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--gold-bright); font-size:1.5rem; margin-top:26px;}

  /* ---------- FAQ ---------- */
  .faq{max-width:820px; margin:0 auto;}
  .faq-item{border-bottom:1px solid var(--line);}
  .faq-q{
    display:flex; justify-content:space-between; align-items:center;
    padding:24px 4px; cursor:pointer; font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--cream);
  }
  .faq-q .plus{color:var(--gold); font-size:1.4rem; transition:.3s;}
  .faq-item.open .plus{transform:rotate(45deg);}
  .faq-a{max-height:0; overflow:hidden; transition:.4s ease; color:var(--cream-dim); font-size:.92rem; line-height:1.7;}
  .faq-item.open .faq-a{max-height:200px; padding-bottom:22px;}

  /* ---------- CONTACT ---------- */
  .contact-grid{display:grid; grid-template-columns:1fr 1fr; gap:50px;}
  .contact-card{border:1px solid var(--line); border-radius:20px; padding:36px; background:rgba(255,255,255,.025);}
  .contact-card .row{display:flex; gap:16px; align-items:flex-start; margin-bottom:24px;}
  .contact-card .ico{width:42px; height:42px; border-radius:12px; background:rgba(205,163,90,.14); color:var(--gold-bright); display:grid; place-items:center; flex:0 0 auto;}
  .contact-card h4{color:var(--cream); font-size:1rem; margin-bottom:4px;}
  .contact-card span{color:var(--cream-dim); font-size:.88rem;}
  .map-box{border-radius:20px; overflow:hidden; border:1px solid var(--line); min-height:340px;}
  .map-box iframe{width:100%; height:100%; min-height:340px; border:0; filter:grayscale(.3) invert(.92) contrast(.9);}
  form.qform{display:grid; gap:14px; margin-top:10px;}
  .qform input, .qform textarea{
    width:100%; padding:13px 16px; border-radius:10px; border:1px solid var(--line);
    background:rgba(255,255,255,.03); color:var(--cream); font-family:'Manrope',sans-serif; font-size:.88rem;
  }
  .qform input::placeholder, .qform textarea::placeholder{color:#a8927a;}
  .qform input:focus, .qform textarea:focus{outline:none; border-color:var(--gold);}

  /* ---------- FOOTER ---------- */
  footer{border-top:1px solid var(--line); padding:70px 0 28px; background:var(--cocoa-900);}
  .foot-grid{display:grid; grid-template-columns:1.4fr 1fr 1fr 1.3fr; gap:50px; margin-bottom:50px;}
  .foot-brand p{color:var(--cream-dim); font-size:.86rem; line-height:1.7; margin:16px 0 22px; max-width:280px;}
  .social{display:flex; gap:10px;}
  .social a{width:38px; height:38px; border-radius:50%; border:1px solid var(--line); display:grid; place-items:center; color:var(--cream); font-size:.85rem; transition:.3s;}
  .social a:hover{background:var(--gold); color:var(--cocoa-950); border-color:var(--gold);}
  .foot-col h5{font-family:'Marcellus',serif; font-size:.78rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-bottom:18px;}
  .foot-col ul{list-style:none; display:grid; gap:11px;}
  .foot-col a{color:var(--cream-dim); font-size:.86rem; transition:.3s;}
  .foot-col a:hover{color:var(--gold-bright);}
  .news-form{display:flex; gap:8px; margin-top:14px;}
  .news-form input{flex:1; padding:11px 14px; border-radius:8px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--cream); font-size:.82rem;}
  .news-form button{padding:11px 18px; border-radius:8px; border:none; background:var(--gold); color:var(--cocoa-950); font-weight:700; cursor:pointer; font-size:.8rem;}
  .foot-bottom{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; padding-top:26px; border-top:1px solid var(--line); font-size:.78rem; color:#a8927a;}
  .foot-bottom .legal{display:flex; gap:18px;}

  /* whatsapp float */
  .wa-float{
    position:fixed; bottom:24px; right:24px; z-index:200;
    width:58px; height:58px; border-radius:50%; background:#25D366;
    display:grid; place-items:center; box-shadow:0 12px 30px -8px rgba(37,211,102,.6);
    animation:pulse 2.4s infinite;
  }
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.5)} 70%{box-shadow:0 0 0 16px rgba(37,211,102,0)} 100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}

  [data-reveal]{opacity:0; transform:translateY(28px); transition:opacity .8s ease, transform .8s ease;}
  [data-reveal].in{opacity:1; transform:translateY(0);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
    [data-reveal]{opacity:1; transform:none;}
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:1080px){
    .grid-products{grid-template-columns:repeat(3,1fr);}
    .cat-tiles{grid-template-columns:repeat(3,1fr);}
    .feat-grid{grid-template-columns:repeat(2,1fr);}
    .test-grid{grid-template-columns:1fr 1fr;}
    .masonry{columns:3 200px;}
    .foot-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:860px){
    .navlinks{display:none;}
    .burger{display:flex;}
    .hero-grid{grid-template-columns:1fr;}
    .hero-card{max-width:380px; margin:0 auto;}
    .about-grid, .contact-grid{grid-template-columns:1fr;}
    .stat-row{gap:24px;}
  }
  @media (max-width:600px){
    .grid-products{grid-temp
